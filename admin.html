<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel - MontoonShop</title>
    <style>
        body {
            font-family: Arial;
            padding: 30px;
            background: #1A1A2E;
            color: white;
        }

        input, button {
            padding: 10px;
            margin: 5px;
            border-radius: 5px;
            border: none;
        }

        button {
            background: #FF5722;
            color: white;
            cursor: pointer;
        }

        .produk {
            margin-top: 20px;
            padding: 10px;
            background: #16213E;
            border-radius: 8px;
        }
    </style>
</head>
<body>

<h1>ADMIN PANEL PRODUK</h1>

<input type="text" id="nama" placeholder="Nama Produk">
<input type="number" id="harga" placeholder="Harga">
<button onclick="tambahProduk()">Tambah Produk</button>

<div id="list"></div>

<br>
<a href="index.html" style="color: orange;">← Kembali ke Website</a>

<script>
let produk = JSON.parse(localStorage.getItem('produk')) || [];

function render() {
    let html = '';
    produk.forEach((p, i) => {
        html += `
        <div class="produk">
            ${p.nama} - Rp ${p.harga.toLocaleString('id-ID')}
            <br>
            <button onclick="hapus(${i})">Hapus</button>
        </div>`;
    });
    document.getElementById('list').innerHTML = html;
}

function tambahProduk() {
    const nama = document.getElementById('nama').value;
    const harga = document.getElementById('harga').value;

    if (!nama || !harga) {
        alert("Isi semua dulu!");
        return;
    }

    produk.push({ nama, harga: Number(harga) });
    localStorage.setItem('produk', JSON.stringify(produk));

    document.getElementById('nama').value = '';
    document.getElementById('harga').value = '';

    render();
}

function hapus(i) {
    produk.splice(i, 1);
    localStorage.setItem('produk', JSON.stringify(produk));
    render();
}

render();
</script>

</body>
</html>
