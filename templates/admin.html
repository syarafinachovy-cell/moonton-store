<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel - MontoonShop</title>
    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            margin: 0;
        }

        header {
            background: #1e293b;
            padding: 15px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
        }

        .container {
            padding: 20px;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .btn {
            background: #22c55e;
            padding: 10px 20px;
            border: none;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        table, th, td {
            border: 1px solid #334155;
        }

        th, td {
            padding: 10px;
            text-align: left;
        }

        th {
            background: #334155;
        }

        .status {
            color: #22c55e;
        }
    </style>
</head>
<body>

<header>
    DASHBOARD ADMIN - MONTOONSHOP
</header>

<div class="container">

    <div class="card">
        <h3>Status Server</h3>
        <p class="status">● Online</p>
    </div>

    <div class="card">
        <h3>Manajemen Produk</h3>
        <button class="btn" onclick="loadProducts()">Sync Produk Digiflazz</button>

        <table>
            <thead>
                <tr>
                    <th>Nama Produk</th>
                    <th>Kode</th>
                    <th>Harga</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="productTable">
                <tr>
                    <td>5 Diamond ML</td>
                    <td>ML5</td>
                    <td>Rp 1.200</td>
                    <td>Aktif</td>
                </tr>
                <tr>
                    <td>77 Diamond ML</td>
                    <td>ML77</td>
                    <td>Rp 19.000</td>
                    <td>Aktif</td>
                </tr>
                <tr>
                    <td>Starlight</td>
                    <td>MLST</td>
                    <td>Rp 48.000</td>
                    <td>Aktif</td>
                </tr>
            </tbody>
        </table>
    </div>

</div>

<script>
function loadProducts() {
    fetch('/products')
    .then(res => res.json())
    .then(data => {
        alert("Produk berhasil di-sync dari server!");
        console.log(data);
    })
    .catch(() => {
        alert("Server siap, menunggu koneksi API Digiflazz.");
    });
}
</script>

</body>
</html>
